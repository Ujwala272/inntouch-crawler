name: Crawler Dependency Install & Test

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      library:
        description: 'Which library to crawl'
        required: true
        default: 'local-sales'
        type: choice
        options:
          - local-sales
          - marketing-suite
      crawl_mode:
        description: 'Crawl mode'
        required: true
        default: 'smart'
        type: choice
        options:
          - smart
          - full
          - discovery

  # Trigger on push to crawler directory
  push:
    paths:
      - 'crawler/**'
      - '.github/workflows/crawler-test.yml'

  # Trigger on pull request
  pull_request:
    paths:
      - 'crawler/**'

jobs:
  install-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install crawler dependencies
        working-directory: ./crawler
        run: npm install

      - name: Install Playwright Chromium browser
        working-directory: ./crawler
        run: npx playwright install chromium --with-deps

      - name: Verify installation
        working-directory: ./crawler
        run: |
          echo "Checking node_modules..."
          ls -la node_modules/ | head -20
          echo ""
          echo "Checking Playwright installation..."
          npx playwright --version
          echo ""
          echo "Testing module import..."
          node -e "import('./core/Crawler.js').then(() => console.log('✅ Crawler module loaded successfully')).catch(e => { console.error('❌ Failed:', e.message); process.exit(1); })"

      - name: Create .env file
        working-directory: ./crawler
        run: |
          echo "INNTOUCH_USERNAME=${{ secrets.INNTOUCH_USERNAME }}" >> .env
          echo "INNTOUCH_PASSWORD=${{ secrets.INNTOUCH_PASSWORD }}" >> .env
          echo "BASE_URL=https://www.inn-touch.ca" >> .env
          echo "HEADLESS=true" >> .env
          echo "LOG_LEVEL=info" >> .env

      - name: Run dry-run test
        working-directory: ./crawler
        run: |
          node bin/crawl.js \
            --preset jive \
            --start-url "https://www.inn-touch.ca/community/local-sales-library?forceNoRedirect=true" \
            --dry-run

      - name: Run InnTouch crawl
        working-directory: ./crawler
        env:
          INNTOUCH_USERNAME: ${{ secrets.INNTOUCH_USERNAME }}
          INNTOUCH_PASSWORD: ${{ secrets.INNTOUCH_PASSWORD }}
          LIBRARY: ${{ github.event.inputs.library || 'local-sales' }}
          CRAWL_MODE: ${{ github.event.inputs.crawl_mode || 'smart' }}
        run: |
          if [ "$LIBRARY" = "marketing-suite" ]; then
            echo "🎨 Crawling Marketing Suite library"
            node bin/crawl.js \
              --config config/marketing-suite.config.json \
              --verbose
          elif [ "$CRAWL_MODE" = "discovery" ]; then
            echo "🔍 Running DISCOVERY mode (500 pages max, no downloads)"
            node bin/crawl.js \
              --config config/inntouch-discovery.config.json \
              --verbose
          elif [ "$CRAWL_MODE" = "smart" ]; then
            echo "🎯 Running SMART mode (600 pages, deduplication, inventory)"
            node bin/crawl.js \
              --config config/inntouch-smart.config.json \
              --verbose
          else
            echo "📥 Running FULL mode (100 pages, with downloads)"
            node bin/crawl.js \
              --config config/inntouch.config.json \
              --verbose
          fi

      - name: Verify output files
        working-directory: ./crawler
        env:
          CRAWL_MODE: ${{ github.event.inputs.crawl_mode || 'smart' }}
        run: |
          echo "Checking output files..."
          ls -lh output/
          echo ""

          if [ "$CRAWL_MODE" = "discovery" ]; then
            echo "=== DISCOVERY MODE RESULTS ==="
            echo ""
            echo "Detailed Analysis:"
            node -e "
              const data = require('./output/inntouch_discovery.json');
              const pages = data.pages || [];
              const metadata = data.metadata || {};
              const stats = metadata.statistics || {};

              console.log('═══════════════════════════════════════════════════════════');
              console.log('📊 DISCOVERY CRAWL REPORT');
              console.log('═══════════════════════════════════════════════════════════');
              console.log('');

              // 1 & 2. URLs discovered vs crawled
              console.log('🔍 URL Discovery:');
              console.log('  • Total unique URLs discovered:', pages.length);
              console.log('  • Total URLs actually crawled:', stats.pagesVisited || pages.length);

              // 3. URLs skipped
              const maxPages = 500;
              const skipped = Math.max(0, (stats.urlsDiscovered || pages.length) - pages.length);
              console.log('  • URLs skipped (queue/limit):', skipped);
              if (pages.length >= maxPages) {
                console.log('  ⚠️  WARNING: Hit maxPages limit! More content likely exists.');
              }
              console.log('');

              // 4 & 5. Categories and content breakdown
              console.log('📁 Content Organization:');

              // Extract categories from URLs
              const categoryMap = {};
              const categoryPattern = /\/local-sales-library\/([^\/\?]+)/;

              pages.forEach(p => {
                const url = p.url || '';
                const match = url.match(categoryPattern);
                if (match && match[1]) {
                  const category = match[1]
                    .replace(/-/g, ' ')
                    .replace(/\\b\\w/g, l => l.toUpperCase());

                  if (!categoryMap[category]) {
                    categoryMap[category] = {
                      pages: [],
                      documents: 0,
                      videos: 0
                    };
                  }
                  categoryMap[category].pages.push(url);
                  categoryMap[category].documents += (p.documents?.length || 0);
                  categoryMap[category].videos += (p.videos?.length || 0);
                }
              });

              const categories = Object.keys(categoryMap).sort();
              console.log('  • Top-level categories discovered:', categories.length);
              console.log('');
              console.log('  Category Breakdown:');
              categories.forEach(cat => {
                const info = categoryMap[cat];
                console.log(\`    - \${cat}\`);
                console.log(\`        Pages: \${info.pages.length}\`);
                console.log(\`        Documents: \${info.documents}\`);
                console.log(\`        Videos: \${info.videos}\`);
              });
              console.log('');

              // Content type breakdown
              console.log('📄 Content Type Distribution:');
              const types = {
                'Category Pages': 0,
                'Document Pages (DOC-)': 0,
                'Standard Pages': 0,
                'Other': 0
              };

              pages.forEach(p => {
                const url = p.url || '';
                if (url.includes('/docs/DOC-')) types['Document Pages (DOC-)']++;
                else if (url.match(categoryPattern) && !url.includes('/docs/')) types['Category Pages']++;
                else if (url.includes('/pages/')) types['Standard Pages']++;
                else types['Other']++;
              });

              Object.entries(types).forEach(([k,v]) => {
                if (v > 0) console.log(\`  • \${k}: \${v}\`);
              });
              console.log('');

              // 6. Maximum depth reached
              console.log('🌲 Crawl Depth Analysis:');
              const depths = pages.map(p => p.depth || 0);
              const maxDepth = depths.length > 0 ? Math.max(...depths) : 0;
              const depthDistribution = {};
              depths.forEach(d => {
                depthDistribution[d] = (depthDistribution[d] || 0) + 1;
              });

              console.log('  • Maximum crawl depth reached:', maxDepth);
              console.log('  • Depth distribution:');
              Object.keys(depthDistribution).sort().forEach(d => {
                console.log(\`      Depth \${d}: \${depthDistribution[d]} pages\`);
              });
              console.log('');

              // 7. Queue status
              console.log('⏸️  Queue Status:');
              const queueInfo = metadata.queueStatus || {};
              const remainingUrls = queueInfo.remainingInQueue || 0;
              const totalDiscovered = queueInfo.totalDiscovered || pages.length;

              if (remainingUrls > 0) {
                console.log('  ⚠️  URLs remain in queue:', remainingUrls);
                console.log('  • These URLs were discovered but not crawled');
                console.log('  • Reason: Hit maxPages limit (\${maxPages})');
              } else {
                console.log('  ✅ Queue empty - all discovered URLs were crawled');
              }
              console.log('');

              // Additional insights
              console.log('📦 Resource Summary:');
              const totalDocs = pages.reduce((sum, p) => sum + (p.documents?.length || 0), 0);
              const totalImages = pages.reduce((sum, p) => sum + (p.images?.length || 0), 0);
              const totalVideos = pages.reduce((sum, p) => sum + (p.videos?.length || 0), 0);

              console.log('  • PDF/Document references:', totalDocs);
              console.log('  • Image references:', totalImages);
              console.log('  • Video embeds:', totalVideos);
              console.log('  • Total resources found:', totalDocs + totalImages + totalVideos);
              console.log('');

              // Recommendations
              console.log('💡 Recommendations:');
              if (pages.length >= maxPages || remainingUrls > 0) {
                const recommended = Math.ceil(pages.length * 1.5);
                console.log(\`  ⚠️  Content limit reached! Increase maxPages to \${recommended}+ and re-run.\`);
              } else {
                console.log(\`  ✅ All content discovered. Run full crawl with maxPages: \${pages.length + 50}\`);
              }

              if (maxDepth >= 4) {
                console.log('  ℹ️  Deep nesting detected. Content well-organized in categories.');
              }

              console.log('');
              console.log('═══════════════════════════════════════════════════════════');
            "
          elif [ "$CRAWL_MODE" = "smart" ]; then
            echo "=== SMART MODE RESULTS ==="
            echo "Output directory structure:"
            ls -lR output/ | head -50
            echo ""

            # Find the actual output directory (marketing-suite or root)
            if [ -d "output/marketing-suite" ]; then
              OUTPUT_DIR="output/marketing-suite"
              JSON_FILE="$OUTPUT_DIR/marketing_suite_crawl.json"
              SUMMARY_FILE="$OUTPUT_DIR/crawl_summary.json"
            else
              OUTPUT_DIR="output"
              JSON_FILE="$OUTPUT_DIR/inntouch_smart_crawl.json"
              SUMMARY_FILE="$OUTPUT_DIR/crawl_summary.json"
            fi

            echo "Using output directory: $OUTPUT_DIR"
            echo ""

            if [ -d "$OUTPUT_DIR/downloads" ]; then
              echo "Checking downloads..."
              ls -lh "$OUTPUT_DIR/downloads/" | head -20
              echo ""
              echo "Download count:"
              find "$OUTPUT_DIR/downloads" -type f | wc -l
            else
              echo "No downloads directory found"
            fi

            echo ""
            if [ -f "$SUMMARY_FILE" ]; then
              echo "Summary report:"
              cat "$SUMMARY_FILE"
            else
              echo "No summary file found"
            fi

            echo ""
            if [ -f "$JSON_FILE" ]; then
              echo "Pages extracted:"
              node -e "const data = require('./$JSON_FILE'); console.log('Total pages:', data.pages?.length || 0); console.log('Categories:', data.categories?.length || 0); console.log('Files downloaded:', data.metadata?.statistics?.filesDownloaded || 0);"
            else
              echo "No JSON output found at $JSON_FILE"
            fi
          else
            echo "=== FULL MODE RESULTS ==="
            echo "Checking downloads..."
            ls -lh output/downloads/ | head -20
            echo ""
            echo "Download count:"
            find output/downloads -type f | wc -l
            echo ""
            echo "JSON output preview:"
            head -50 output/inntouch_library_content.json
            echo ""
            echo "CSV output preview:"
            head -10 output/inntouch_library_content.csv
            echo ""
            echo "Pages extracted:"
            node -e "const data = require('./output/inntouch_library_content.json'); console.log('Total pages:', data.pages?.length || 0); console.log('Categories:', data.categories?.length || 0); console.log('Files downloaded:', data.metadata?.statistics?.filesDownloaded || 0);"
          fi

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        if: always()
        env:
          LIBRARY: ${{ github.event.inputs.library || 'local-sales' }}
          CRAWL_MODE: ${{ github.event.inputs.crawl_mode || 'smart' }}
        with:
          name: ${{ github.event.inputs.library || 'local-sales' }}-${{ github.event.inputs.crawl_mode || 'smart' }}-${{ github.run_number }}
          path: |
            crawler/output/**/*.json
            crawler/output/**/*.csv
            crawler/output/**/downloads/**
          retention-days: 30

      - name: Upload npm debug logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: npm-debug-logs-${{ github.run_number }}
          path: |
            crawler/npm-debug.log
            crawler/package-lock.json
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          echo "## Crawler Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Node Version:** $(node --version)" >> $GITHUB_STEP_SUMMARY
          echo "**NPM Version:** $(npm --version)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          CRAWL_MODE="${{ github.event.inputs.crawl_mode || 'smart' }}"

          if [ "$CRAWL_MODE" = "discovery" ]; then
            if [ -f crawler/output/inntouch_discovery.json ]; then
              cd crawler
              echo "**Mode:** Discovery (no downloads)" >> $GITHUB_STEP_SUMMARY
              echo "**Pages Discovered:** $(node -e "console.log(require('./output/inntouch_discovery.json').pages?.length || 0)")" >> $GITHUB_STEP_SUMMARY
              echo "**Categories Found:** $(node -e "console.log(require('./output/inntouch_discovery.json').categories?.length || 0)")" >> $GITHUB_STEP_SUMMARY
              echo "**Potential Files:** $(node -e "const d=require('./output/inntouch_discovery.json'); console.log(d.pages?.reduce((s,p)=>s+(p.documents?.length||0)+(p.images?.length||0),0)||0)")" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "✅ Discovery crawl completed successfully" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ No discovery output generated" >> $GITHUB_STEP_SUMMARY
            fi
          elif [ "$CRAWL_MODE" = "smart" ]; then
            if [ -f crawler/output/inntouch_smart_crawl.json ]; then
              cd crawler
              echo "**Mode:** Smart (deduplication, inventory)" >> $GITHUB_STEP_SUMMARY
              echo "**Pages Extracted:** $(node -e "console.log(require('./output/inntouch_smart_crawl.json').pages?.length || 0)")" >> $GITHUB_STEP_SUMMARY
              echo "**Categories Found:** $(node -e "console.log(require('./output/inntouch_smart_crawl.json').categories?.length || 0)")" >> $GITHUB_STEP_SUMMARY
              echo "**Files Downloaded:** $(node -e "console.log(require('./output/inntouch_smart_crawl.json').metadata?.statistics?.filesDownloaded || 0)")" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "✅ Smart crawl completed successfully" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ No smart crawl output generated" >> $GITHUB_STEP_SUMMARY
            fi
          else
            if [ -f crawler/output/inntouch_library_content.json ]; then
              cd crawler
              echo "**Mode:** Full (with downloads)" >> $GITHUB_STEP_SUMMARY
              echo "**Pages Extracted:** $(node -e "console.log(require('./output/inntouch_library_content.json').pages?.length || 0)")" >> $GITHUB_STEP_SUMMARY
              echo "**Categories Found:** $(node -e "console.log(require('./output/inntouch_library_content.json').categories?.length || 0)")" >> $GITHUB_STEP_SUMMARY
              echo "**Files Downloaded:** $(node -e "console.log(require('./output/inntouch_library_content.json').metadata?.statistics?.filesDownloaded || 0)")" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "✅ Full crawl completed successfully" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ No output files generated" >> $GITHUB_STEP_SUMMARY
            fi
          fi
